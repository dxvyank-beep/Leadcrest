<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Leadcrest helps local businesses get more calls, leads & customers through modern websites, local SEO, and Google Business Profile optimization." />
    <meta name="keywords" content="local business marketing, plumber website design, HVAC digital marketing, contractor SEO, local SEO services, Google Business Profile optimization, lead generation, small business website" />
    <meta name="theme-color" content="#0a0014" />
    <title>Leadcrest | Local Business Marketing Agency</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-render-blocking font load: swap from print to all on load -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Analytics: deferred to after page load so it never blocks rendering -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-NR0J3VBCSR';
        s.async = true;
        document.head.appendChild(s);
        s.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-NR0J3VBCSR');
        };
      });
    </script>
  </body>
</html>
